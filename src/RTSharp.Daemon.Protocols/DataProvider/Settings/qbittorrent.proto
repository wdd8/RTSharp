syntax = "proto3";

option csharp_namespace = "RTSharp.Daemon.Protocols.DataProvider.Settings";

import "google/protobuf/empty.proto";
import "google/protobuf/wrappers.proto";

service GRPCQBittorrentSettingsService {
    rpc GetDefaultSavePath (google.protobuf.Empty) returns (google.protobuf.StringValue);
    rpc GetSettings (google.protobuf.Empty) returns (QBittorrentSettings);
    rpc SetSettings (QBittorrentSettings) returns (google.protobuf.Empty);
    rpc GetNetworkInterfaces (google.protobuf.Empty) returns (QBittorrentNetworkInterfaces);
    rpc GetNetworkInterfaceAddresses (QBittorrentNetworkInterfaceAddressRequest) returns (QBittorrentNetworkInterfaceAddresses);
}

message QBittorrentNetworkInterface {
    string Id = 1;
    string Name = 2;
}

message QBittorrentNetworkInterfaces {
    repeated QBittorrentNetworkInterface Interfaces = 1;
}

message QBittorrentNetworkInterfaceAddressRequest {
    string InterfaceId = 1;
}

message QBittorrentNetworkInterfaceAddresses {
    repeated string Addresses = 1;
}

enum QBittorrentEncryption {
    QBittorrentEncryption_PREFER = 0;
    QBittorrentEncryption_FORCE_ON = 1;
    QBittorrentEncryption_FORCE_OFF = 2;
}

enum QBittorrentBittorrentProtocol {
    QBittorrentBittorrentProtocol_BOTH = 0;
    QBittorrentBittorrentProtocol_TCP = 1;
    QBittorrentBittorrentProtocol_UTP = 2;
}

enum QBittorrentProxyType {
    QBittorrentProxyType_NONE = 0;
    QBittorrentProxyType_HTTP = 1;
    QBittorrentProxyType_SOCKS5 = 2;
    QBittorrentProxyType_HTTP_AUTH = 3;
    QBittorrentProxyType_SOCKS5_AUTH = 4;
    QBittorrentProxyType_SOCKS4 = 5;
}

enum QBittorrentMaxRatioAction {
    QBittorrentMaxRatioAction_STOP = 0;
    QBittorrentMaxRatioAction_REMOVE = 1;
    QBittorrentMaxRatioAction_ENABLE_SUPER_SEEDING = 2;
    QBittorrentMaxRatioAction_REMOVE_WITH_CONTENT = 3;
}

enum QBittorrentSchedulerDay {
    QBittorrentSchedulerDay_EVERY = 0;
    QBittorrentSchedulerDay_WEEKDAY = 1;
    QBittorrentSchedulerDay_WEEKEND = 2;
    QBittorrentSchedulerDay_MONDAY = 3;
    QBittorrentSchedulerDay_TUESDAY = 4;
    QBittorrentSchedulerDay_WEDNESDAY = 5;
    QBittorrentSchedulerDay_THURSDAY = 6;
    QBittorrentSchedulerDay_FRIDAY = 7;
    QBittorrentSchedulerDay_SATURDAY = 8;
    QBittorrentSchedulerDay_SUNDAY = 9;
}

enum QBittorrentChokingAlgorithm {
    QBittorrentChokingAlgorithm_FIXED_SLOTS = 0;
    QBittorrentChokingAlgorithm_RATE_BASED = 1;
}

enum QBittorrentSeedChokingAlgorithm {
    QBittorrentSeedChokingAlgorithm_ROUND_ROBIN = 0;
    QBittorrentSeedChokingAlgorithm_FASTEST_UPLOAD = 1;
    QBittorrentSeedChokingAlgorithm_ANTI_LEECH = 2;
}

enum QBittorrentUtpTcpMixedModeAlgorithm {
    QBittorrentUtpTcpMixedModeAlgorithm_PREFER_TCP = 0;
    QBittorrentUtpTcpMixedModeAlgorithm_PEER_PROPORTIONAL = 1;
}

enum QBittorrentDynamicDnsService {
    QBittorrentDynamicDnsService_NONE = 0;
    QBittorrentDynamicDnsService_DYNDNS = 1;
    QBittorrentDynamicDnsService_NOIP = 2;
}

