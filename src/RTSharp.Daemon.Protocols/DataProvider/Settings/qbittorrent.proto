    // Behaviour
    google.protobuf.BoolValue LogEnabled = 1;
    google.protobuf.StringValue LogPath = 2;
    google.protobuf.BoolValue LogBackupEnabled = 3;
    google.protobuf.Int32Value LogMaxSize = 4;
    google.protobuf.BoolValue LogDeleteOld = 5;
    google.protobuf.Int32Value LogAge = 6;
