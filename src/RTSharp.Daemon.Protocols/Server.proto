syntax = "proto3";

option csharp_namespace = "RTSharp.Daemon.Protocols";

import "google/protobuf/wrappers.proto";
import "google/protobuf/empty.proto";

service GRPCServerService {
    rpc Test (google.protobuf.Empty) returns (google.protobuf.Empty);

    rpc StartScript (StartScriptInput) returns (ScriptSessionReply);
    rpc ScriptStatus (google.protobuf.BytesValue) returns (stream ScriptProgressState);
    rpc ScriptsStatus (google.protobuf.Empty) returns (stream ScriptSessionsUpdate);
    rpc StopScript (google.protobuf.BytesValue) returns (google.protobuf.Empty);
    rpc RemoveScript (google.protobuf.BytesValue) returns (google.protobuf.Empty);
}

message StartScriptInput {
    string Script = 1;
    string Name = 2;
    map<string, string> Variables = 3;
}

enum TaskState {
    WAITING = 0;
    RUNNING = 1;
    FAILED = 2;
    DONE = 3;
}

message ScriptProgressState {
    bytes Id = 1;
    repeated ScriptProgressState Chain = 2;
    string Text = 3;
    float Progress = 4;
    TaskState State = 5;
    google.protobuf.StringValue StateData = 6;
}

message ScriptSessionState {
    bytes Id = 1;
    string Name = 2;
    ScriptProgressState Progress = 3;
}

message ScriptSessionsFullUpdate {
    repeated ScriptSessionState Sessions = 1;
}

message ScriptSessionDeltaUpdate {
    bytes SessionId = 1;
    google.protobuf.BytesValue ParentStateId = 2;
    ScriptProgressState State = 3;
}

message ScriptSessionsUpdate {
    oneof Update {
        ScriptSessionsFullUpdate FullUpdate = 1;
        ScriptSessionDeltaUpdate DeltaUpdate = 2;
    }
}

message ScriptSessionReply {
    bytes Id = 1;
}
